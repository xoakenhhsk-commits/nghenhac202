<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Player - Nghe nhạc Online</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-music"></i>
                <h2>MusicPlayer</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-tab="home">
                    <i class="fas fa-home"></i>
                    <span>Trang chủ</span>
                </a>
                <a href="#" class="nav-item" data-tab="library">
                    <i class="fas fa-headphones"></i>
                    <span>Thư viện</span>
                </a>
                <a href="#" class="nav-item" data-tab="upload">
                    <i class="fas fa-upload"></i>
                    <span>Tải lên</span>
                </a>
            </nav>
            
            <div class="user-section" id="userSection">
                <div class="user-info" id="userInfo" style="display: none;">
                    <i class="fas fa-user-circle"></i>
                    <span id="username"></span>
                </div>
                <button class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h1 id="pageTitle">Khám phá âm nhạc</h1>
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <!-- Home Tab -->
            <div class="tab-content active" id="homeTab">
                <div class="stats-cards" id="statsCards" style="display: none;">
                    <div class="stat-card">
                        <i class="fas fa-music"></i>
                        <div class="stat-info">
                            <h3 id="songCount">0</h3>
                            <p>Bài hát</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-play-circle"></i>
                        <div class="stat-info">
                            <h3 id="totalPlays">0</h3>
                            <p>Lượt nghe</p>
                        </div>
                    </div>
                </div>
                
                <div class="songs-grid" id="songsGrid">
                    <!-- Songs will be loaded here -->
                </div>
            </div>
            
            <!-- Library Tab -->
            <div class="tab-content" id="libraryTab">
                <div class="songs-list" id="songsList">
                    <!-- Library songs will be loaded here -->
                </div>
            </div>
            
            <!-- Upload Tab -->
            <div class="tab-content" id="uploadTab">
                <div class="upload-container">
                    <div class="upload-area" id="uploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h3>Tải lên bài hát của bạn</h3>
                        <p>Kéo thả file nhạc vào đây hoặc click để chọn</p>
                        <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,.m4a" style="display: none;">
                        <button class="btn-upload" id="selectFileBtn">
                            <i class="fas fa-music"></i>
                            Chọn file nhạc
                        </button>
                    </div>
                    
                    <div class="upload-form" id="uploadForm" style="display: none;">
                        <input type="text" id="songTitle" placeholder="Tên bài hát">
                        <input type="text" id="songArtist" placeholder="Nghệ sĩ">
                        <button class="btn-submit" id="submitUpload">
                            <i class="fas fa-check"></i>
                            Đăng tải
                        </button>
                        <button class="btn-cancel" id="cancelUpload">
                            <i class="fas fa-times"></i>
                            Hủy
                        </button>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Music Player (Bottom) -->
        <div class="music-player" id="musicPlayer">
            <div class="player-info">
                <div class="song-art">
                    <i class="fas fa-music"></i>
                </div>
                <div class="song-details">
                    <h4 id="currentSongTitle">Chưa có bài hát</h4>
                    <p id="currentSongArtist">---</p>
                </div>
            </div>
            
            <div class="player-controls">
                <div class="control-buttons">
                    <button id="prevBtn" class="control-btn">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button id="playBtn" class="control-btn play-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="nextBtn" class="control-btn">
                        <i class="fas fa-step-forward"></i>
                    </button>
                </div>
                
                <div class="progress-container">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
            </div>
            
            <div class="player-extras">
                <button id="repeatBtn" class="extra-btn">
                    <i class="fas fa-redo-alt"></i>
                </button>
                <button id="shuffleBtn" class="extra-btn">
                    <i class="fas fa-random"></i>
                </button>
                <div class="volume-control">
                    <i class="fas fa-volume-up"></i>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                </div>
            </div>
        </div>
    </div>
    
    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Đăng nhập / Đăng ký</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" data-auth="login">Đăng nhập</button>
                <button class="auth-tab" data-auth="register">Đăng ký</button>
            </div>
            
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Tên đăng nhập" required>
                <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
                <button type="submit">Đăng nhập</button>
            </form>
            
            <form id="registerForm" style="display: none;">
                <input type="text" id="regUsername" placeholder="Tên đăng nhập" required>
                <input type="password" id="regPassword" placeholder="Mật khẩu" required>
                <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" required>
                <button type="submit">Đăng ký</button>
            </form>
        </div>
    </div>
    
    <audio id="audioPlayer" preload="metadata"></audio>
    
    <script src="{{ url_for('static', filename='js/player.js') }}"></script>
</body>

</html>
